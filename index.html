<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>benchmark game (tentative title)</title>

    <link rel="stylesheet" href="css/styles.css" />

    <script src="js/animation.js" defer></script>
    <script src="js/game.js" defer></script>
    <script src="js/app.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Funnel+Sans:ital,wght@0,300..800;1,300..800&family=Pirata+One&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Splash Screen -->
    <div id="splashScreen" class="animationHidden">
      <canvas id="introCanvas"> </canvas>
    </div>

    <!-- Game Screen -->
    <div id="gameScreen" class="game gameHidden">
      <div class="gameHeader">
        <p>Level: 1</p>
        <p>Lives: 3</p>
      </div>
      <div id="gridContainer"></div>
    </div>

    <!-- Results Screen -->
    <div id="resultsScreen" class="resultsHidden">
      <img src="" alt="" />
      <h1>Visual Memory Test</h1>
      <p>Level 1</p>
      <button id="tryAgainBtn">Try Again</button>
    </div>
  </body>
</html>
